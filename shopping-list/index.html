<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="supabase.jsx"></script>
<script type="text/babel" src="session.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="view.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel" src="account.jsx"></script>

<script type="text/babel">
// Together — shared shopping list. A single responsive screen: below 720px it
// renders the mobile card layout, at/above it the desktop table layout. The
// design's three configurable props (primaryColor, partnerColor, showCreatedDate)
// are exposed through the shared Tweaks panel.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#c98a5c",
  "partnerColor": "#8a9b6e",
  "showCreatedDate": true
}/*EDITMODE-END*/;

function useIsDesktop(breakpoint = 720) {
  const get = () => typeof window !== 'undefined' && window.innerWidth >= breakpoint;
  const [isDesktop, setIsDesktop] = React.useState(get);
  React.useEffect(() => {
    const onResize = () => setIsDesktop(get());
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  return isDesktop;
}

// Auth gate: resolve session → sign-in screen → set up homespace → the board.
function App() {
  const sx = window.useTogetherSession();
  const { SignIn, Splash } = window.TogetherAccount;
  if (!sx.ready) return <Splash text="…" />;
  if (!sx.session) return <SignIn onGoogle={sx.actions.signInGoogle} />;
  if (!sx.homespaceId) return <Splash text={sx.error ? ('Something went wrong: ' + sx.error) : 'Setting up your space…'} />;
  return <Board sx={sx} />;
}

function Board({ sx }) {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { TweaksPanel, TweakSection, TweakColor, TweakToggle } = window;
  const { Brand, LabelFilters, StatusFilters, LabelsPanel, ItemCard, ItemRow, EmptyState, SwipeRow, uppercaseLabel } = window.TogetherUI;
  const { AddModal, BulkModal, DetailModal, ImageModal, BugModal } = window.TogetherModals;
  const { HomeButton, AccountButton, AccountSheet } = window.TogetherAccount;
  const [accountOpen, setAccountOpen] = React.useState(false);

  const primary = tweaks.primaryColor || '#c98a5c';
  const partner = tweaks.partnerColor || '#8a9b6e';
  const showDate = tweaks.showCreatedDate !== false;
  const isDesktop = useIsDesktop();

  // Expose the brand colors as CSS vars so static stylesheet rules pick them up.
  React.useEffect(() => {
    document.documentElement.style.setProperty('--primary', primary);
    document.documentElement.style.setProperty('--partner', partner);
  }, [primary, partner]);

  const [state, actions] = window.useTogetherStore(sx.homespaceId, sx.me);
  const v = window.buildTogetherView(state, actions, { primary, partner, showDate, members: sx.members, me: sx.me });

  // Export: a setup sheet to pick which items (filter, default = current) and
  // which fields (default = all), then Copy to clipboard.
  const [exportOpen, setExportOpen] = React.useState(false);
  const ExportBtn = () => (
    <button onClick={() => setExportOpen(true)} title="Export this list"
      style={{ display: 'inline-flex', alignItems: 'center', gap: 7, background: '#fff', border: '1px solid #e6ded2', borderRadius: 12, padding: '9px 15px', fontSize: 13, fontFamily: 'inherit', color: '#7a7166', fontWeight: 800, cursor: 'pointer' }}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" /></svg>
      Export
    </button>
  );
  function ExportSheet({ onClose }) {
    const labels = state.labels;
    const nameByUid = {}; (sx.members || []).forEach(m => { nameByUid[m.uid] = m.name; });
    const af = state.activeFilter, sf = state.statusFilter;
    const [selLabels, setSelLabels] = React.useState(() => new Set(af === 'all' ? labels.map(l => l.id) : [af]));
    const [incTobuy, setIncTobuy] = React.useState(sf !== 'done');
    const [incDone, setIncDone] = React.useState(sf !== 'tobuy');
    const [impOnly, setImpOnly] = React.useState(sf === 'important');
    const [fields, setFields] = React.useState({ qty: true, label: true, by: true, status: true, important: true });
    const [copied, setCopied] = React.useState(false);
    const toggleLabel = (id) => setSelLabels(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
    const tf = (k) => setFields(f => ({ ...f, [k]: !f[k] }));

    const rows = state.items
      .filter(it => selLabels.has(it.labelId))
      .filter(it => (it.done ? incDone : incTobuy))
      .filter(it => !impOnly || it.important);
    const lines = rows.map(it => {
      const label = labels.find(l => l.id === it.labelId);
      let line = (it.done ? '✓' : '•') + ' ' + it.name;
      if (fields.qty && (it.qty || it.unit)) line += ' — ' + it.qty + (it.unit ? ' ' + it.unit : '');
      const tail = [];
      if (fields.label && label) tail.push('[' + label.name + ']');
      if (fields.by && (nameByUid[it.by] || it.by)) tail.push('(' + (nameByUid[it.by] || it.by) + ')');
      if (fields.status) tail.push(it.done ? 'Done' : 'To Buy');
      if (fields.important && it.important) tail.push('⭐');
      if (tail.length) line += ' ' + tail.join(' ');
      return line;
    });
    const title = (sx.homespace && sx.homespace.name ? sx.homespace.name + ' · ' : '') + 'Shopping list';
    const text = lines.length ? ('🛒 ' + title + '\n' + lines.join('\n')) : 'No items match these filters.';
    const doCopy = async () => { try { await navigator.clipboard.writeText(text); } catch (e) {} setCopied(true); window.setTimeout(() => { setCopied(false); onClose(); }, 800); };

    const Chip = ({ on, onClick, children }) => (
      <button onClick={onClick} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '7px 13px', borderRadius: 999, border: '1px solid ' + (on ? 'var(--primary)' : '#ece6db'), background: on ? 'var(--primary)' : '#fff', color: on ? '#fff' : '#8a8175', fontSize: 13, fontWeight: 800, cursor: 'pointer', fontFamily: 'inherit' }}>{on && <span style={{ fontSize: 11 }}>✓</span>}{children}</button>
    );
    const Section = ({ label, children }) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
        <span style={{ fontSize: 11, fontWeight: 800, color: '#aaa093', letterSpacing: '.6px', textTransform: 'uppercase' }}>{label}</span>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>{children}</div>
      </div>
    );
    return (
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 1300, background: 'rgba(58,53,47,.42)', backdropFilter: 'blur(3px)', WebkitBackdropFilter: 'blur(3px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 18, animation: 'tog-fade .15s ease' }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 380, background: '#f6f4ef', borderRadius: 26, boxShadow: '0 24px 60px rgba(58,53,47,.34)', overflow: 'hidden', maxHeight: '92vh', display: 'flex', flexDirection: 'column', animation: 'tog-pop .18s ease' }}>
          <div style={{ padding: '22px 22px 14px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
            <div><h2 style={{ fontFamily: "'Quicksand',sans-serif", fontSize: 23, fontWeight: 700, margin: 0, color: '#3a352f' }}>Export list</h2><p style={{ margin: '4px 0 0', fontSize: 14, color: '#9a9186', fontWeight: 600 }}>Choose what to copy.</p></div>
            <button onClick={onClose} style={{ flexShrink: 0, width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#ece6db', color: '#857c70', fontSize: 17, cursor: 'pointer', lineHeight: 1 }}>×</button>
          </div>
          <div className="tog-scroll" style={{ overflowY: 'auto', padding: '0 22px', display: 'flex', flexDirection: 'column', gap: 16 }}>
            <Section label="Labels to include">
              {labels.map(l => <Chip key={l.id} on={selLabels.has(l.id)} onClick={() => toggleLabel(l.id)}>{l.name}</Chip>)}
            </Section>
            <Section label="Status">
              <Chip on={incTobuy} onClick={() => setIncTobuy(v => !v)}>To Buy</Chip>
              <Chip on={incDone} onClick={() => setIncDone(v => !v)}>Done</Chip>
              <Chip on={impOnly} onClick={() => setImpOnly(v => !v)}>Important only</Chip>
            </Section>
            <Section label="Fields">
              <Chip on onClick={() => {}}>Name</Chip>
              <Chip on={fields.qty} onClick={() => tf('qty')}>Quantity</Chip>
              <Chip on={fields.label} onClick={() => tf('label')}>Label</Chip>
              <Chip on={fields.by} onClick={() => tf('by')}>Added by</Chip>
              <Chip on={fields.status} onClick={() => tf('status')}>Status</Chip>
              <Chip on={fields.important} onClick={() => tf('important')}>Important ⭐</Chip>
            </Section>
          </div>
          <div style={{ padding: '16px 22px 22px', display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: '#9a9186' }}>{lines.length} item{lines.length === 1 ? '' : 's'}</span>
            <button onClick={doCopy} style={{ marginLeft: 'auto', flex: 1, maxWidth: 200, background: 'var(--primary)', color: '#fff', border: 'none', borderRadius: 14, padding: 13, fontWeight: 800, fontSize: 14.5, cursor: 'pointer', fontFamily: 'inherit' }}>{copied ? 'Copied!' : 'Copy'}</button>
          </div>
        </div>
      </div>
    );
  }

  // collapsible filter sections — remembered per device
  const FILT_KEY = 'togetherkit.filterui';
  const [filtersOpen, setFiltersOpen] = React.useState(() => {
    try { return { labels: true, status: true, ...(JSON.parse(localStorage.getItem(FILT_KEY)) || {}) }; }
    catch (e) { return { labels: true, status: true }; }
  });
  const toggleFilter = (k) => setFiltersOpen(s => {
    const n = { ...s, [k]: !s[k] };
    try { localStorage.setItem(FILT_KEY, JSON.stringify(n)); } catch (e) {}
    return n;
  });
  const filterSummary = (kind) => {
    if (kind === 'labels') { const f = v.filters.find(x => x.id === state.activeFilter); return f ? f.name : ''; }
    const s = v.statusFilters.find(x => x.id === state.statusFilter); return s ? s.name : '';
  };

  const FilterGroup = ({ label, kind }) => {
    const open = filtersOpen[kind];
    const summary = filterSummary(kind);
    return (
      <div>
        <button onClick={() => toggleFilter(kind)}
          style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', background: 'none', border: 'none', padding: '3px 2px', cursor: 'pointer', fontFamily: 'inherit' }}>
          <span style={uppercaseLabel}>{label}</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 9, color: '#bcb3a6' }}>
            {!open && summary && <span style={{ fontSize: 12, fontWeight: 800, color: '#857c70', background: '#fff', border: '1px solid #ece6db', padding: '3px 11px', borderRadius: 999, whiteSpace: 'nowrap' }}>{summary}</span>}
            <window.Icons.Chevron size={16} open={open} />
          </span>
        </button>
        {open && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, alignItems: 'center', marginTop: 9 }}>
            {kind === 'labels' ? <LabelFilters v={v} /> : <StatusFilters v={v} />}
          </div>
        )}
      </div>
    );
  };

  return (
    <div className="app">
      <div className="app-shell">
        <div className="app-body">

          {/* Header + actions */}
          {isDesktop ? (
            <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 20 }}>
              <Brand titleSize={34} subSize={15} dot={20} />
              <div style={{ display: 'flex', gap: 11 }}>
                <button onClick={v.openAdd} style={v.addItemBtnDeskStyle}><window.Icons.Plus size={17} />Add Item</button>
                <button onClick={v.openBulk} style={v.bulkBtnDeskStyle}><window.Icons.Plus size={17} />Bulk Add</button>
              </div>
            </div>
          ) : (
            <React.Fragment>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, paddingTop: 4 }}>
                <Brand titleSize={31} subSize={14} dot={18} />
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={v.openAdd} style={v.addItemBtnStyle}><window.Icons.Plus size={16} />Add Item</button>
                <button onClick={v.openBulk} style={v.bulkBtnStyle}><window.Icons.Plus size={16} />Bulk Add</button>
              </div>
            </React.Fragment>
          )}

          {/* Filters */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: isDesktop ? 14 : 13 }}>
            <FilterGroup label="Labels" kind="labels" />
            <FilterGroup label="Status" kind="status" />
            {isDesktop && v.labelsOpen && <LabelsPanel v={v} maxWidth={560} />}
          </div>
          {!isDesktop && v.labelsOpen && <LabelsPanel v={v} />}

          {/* List */}
          {isDesktop ? (
            <React.Fragment>
            <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: -8 }}><ExportBtn /></div>
            <div style={{ background: '#fff', borderRadius: 22, padding: '6px 22px 12px', boxShadow: 'var(--shadow-md)' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '40px minmax(0,1fr) 84px 128px 168px 132px 30px', gap: 14, alignItems: 'center', padding: '16px 6px', borderBottom: '1px solid #f0ebe2' }}>
                <span />
                {['Item', 'Qty', 'Label', 'Added by', 'Status'].map(h => (
                  <span key={h} style={{ fontSize: 11, fontWeight: 800, color: '#aaa093', letterSpacing: '.7px', textTransform: 'uppercase' }}>{h}</span>
                ))}
                <span />
              </div>
              {v.items.map(item => (
                <SwipeRow key={item.id} radius={0} frontBg={item.important ? '#fdf8ee' : '#fff'} onDelete={item.deleteSelf} onComplete={item.toggleDone} completeLabel={item.isDone ? 'To Buy' : 'Done'}>
                  <ItemRow item={item} showDate={showDate} />
                </SwipeRow>
              ))}
              {state.syncing ? <EmptyState text="Syncing…" pad="44px 20px" /> : (v.isEmpty && <EmptyState text={v.emptyText} pad="44px 20px" />)}
            </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '2px 4px', gap: 10 }}>
                <span style={{ fontSize: 12, fontWeight: 800, color: '#857c70', letterSpacing: '.6px', textTransform: 'uppercase' }}>{v.listHeading}</span>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <select value={v.sortMode} onChange={v.setSortMode} style={{ background: '#fff', border: '1px solid #ece6db', borderRadius: 9, padding: '5px 9px', fontSize: 12, fontFamily: 'inherit', color: '#7a7166', fontWeight: 700, outline: 'none', cursor: 'pointer' }}>
                    {v.sortOptions.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
                  </select>
                  <span style={{ fontSize: 12, fontWeight: 800, color: '#b07d42', background: '#f6ebdc', padding: '4px 11px', borderRadius: 999, whiteSpace: 'nowrap' }}>{v.toBuyLabel}</span>
                </div>
              </div>
              <div style={{ display: 'flex', justifyContent: 'flex-end' }}><ExportBtn /></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {v.items.map(item => (
                  <SwipeRow key={item.id} radius={18} onDelete={item.deleteSelf} onComplete={item.toggleDone} completeLabel={item.isDone ? 'To Buy' : 'Done'}>
                    <ItemCard item={item} showDate={showDate} />
                  </SwipeRow>
                ))}
                {state.syncing ? <EmptyState text="Syncing…" pad="34px 20px" /> : (v.isEmpty && <EmptyState text={v.emptyText} pad="34px 20px" />)}
              </div>
            </React.Fragment>
          )}

        </div>
      </div>

      {/* shared unit suggestions for the qty/unit inputs */}
      <datalist id="together-units">
        {v.unitSuggestions.map(u => <option key={u} value={u} />)}
      </datalist>

      {/* fixed account button (top-left) — names, members, invite, sign out */}
      <HomeButton href="../" />
      <AccountButton sx={sx} onOpen={() => setAccountOpen(true)} />
      {accountOpen && <AccountSheet sx={sx} onClose={() => setAccountOpen(false)} />}

      {/* fixed bug-report button */}
      <button onClick={v.openBug} title="Report a problem"
              style={{ position: 'fixed', top: 24, right: 24, zIndex: 900, width: 46, height: 46, borderRadius: '50%', border: '1px solid #ecd9c4', background: '#fffaf3', color: '#b07d42', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 2px 4px rgba(58,53,47,.08),0 8px 20px rgba(58,53,47,.12)' }}>
        <window.Icons.Bug size={21} />
      </button>

      <AddModal v={v} />
      <BulkModal v={v} />
      <DetailModal v={v} />
      <ImageModal v={v} />
      <BugModal v={v} />
      {exportOpen && <ExportSheet onClose={() => setExportOpen(false)} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="People">
          <TweakColor label="Primary" value={tweaks.primaryColor} onChange={(c) => setTweak('primaryColor', c)}
                      options={['#c98a5c', '#d97757', '#cf6a52', '#b07d42']} />
          <TweakColor label="Partner" value={tweaks.partnerColor} onChange={(c) => setTweak('partnerColor', c)}
                      options={['#8a9b6e', '#6f8050', '#5e827b', '#7e6f86']} />
        </TweakSection>
        <TweakSection label="List">
          <TweakToggle label="Show created date" value={tweaks.showCreatedDate}
                       onChange={(b) => setTweak('showCreatedDate', b)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
