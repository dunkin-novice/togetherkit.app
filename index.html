<style>
  /* Hub-specific card styling (the signed-in landing). The sign-in / splash
     screens are the shared TogetherAccount components and use styles.css. */
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .shell {
    width: 100%; max-width: 460px; background: #f6f4ef; border: 1px solid #efe9e0;
    border-radius: 30px; box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 30px 60px rgba(58,53,47,.14);
    padding: 40px 28px 34px;
  }
  .brand-dots { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .brand-dots span { width: 20px; height: 20px; border-radius: 50%; }
  .brand-dots span:nth-child(1) { background: #c98a5c; }
  .brand-dots span:nth-child(2) { background: #8a9b6e; margin-left: -8px; }
  h1 { font-family: 'Quicksand', sans-serif; font-size: 34px; font-weight: 700; margin: 0; text-align: center; letter-spacing: .3px; }
  .sub { margin: 6px 0 28px; text-align: center; color: #9a9186; font-weight: 600; font-size: 15px; }
  .label { font-size: 11px; font-weight: 800; color: #aaa093; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px 2px; }
  .features { display: flex; flex-direction: column; gap: 12px; }
  .feature {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    background: #fff; border: 1px solid transparent; text-decoration: none; color: inherit;
    box-shadow: 0 1px 2px rgba(58,53,47,.05), 0 6px 16px rgba(58,53,47,.035);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .feature:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 12px 26px rgba(58,53,47,.08); }
  .feature .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #f4e8dd; color: #a8794f; }
  .feature .title { font-family: 'Quicksand', sans-serif; font-size: 18px; font-weight: 700; }
  .feature .desc { font-size: 13px; font-weight: 600; color: #9a9186; margin-top: 2px; }
  .feature .arrow { margin-left: auto; color: #c3bbae; font-size: 22px; }
  .soon {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    border: 1px dashed #d9cbb7; color: #b3a99c;
  }
  .soon .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #efe9e0; color: #b3a99c; font-size: 22px; font-weight: 800; }
  .soon .title { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: #a89e90; }
  .soon .desc { font-size: 13px; font-weight: 600; margin-top: 2px; }
</style>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" crossorigin="anonymous"></script>

  <!-- shared modules (reused from shopping-list/): icon set, auth client, session/homespace, account UI -->
  <script type="text/babel" src="shopping-list/icons.jsx"></script>
  <script type="text/babel" src="shopping-list/supabase.jsx"></script>
  <script type="text/babel" src="shopping-list/session.jsx"></script>
  <script type="text/babel" src="shopping-list/account.jsx"></script>

  <script type="text/babel">
  // The hub is gated behind Google sign-in, exactly like the apps: resolve the
  // session → show the sign-in screen → set up the homespace → show the launcher.
  // Signing in here means you arrive at either app already logged in.
  const EMOJIS = ['📋','🎬','🎁','🍿','✈️','🏠','💪','📚','🎵','🌱','💡','❤️','🐾','🍳','🧳','🎉'];

  // A custom-list card with swipe-left to reveal Pin / Archive / Delete (or
  // Unarchive / Delete for archived lists). Tap the card to open the list.
  function HubSwipeCard({ list, onPin, onArchive, onUnarchive, onDelete }) {
    const TRAY = list.archived ? 124 : 168;
    const [dx, setDx] = React.useState(0);
    const [dragging, setDragging] = React.useState(false);
    const st = React.useRef(null); const dxRef = React.useRef(0); const movedRef = React.useRef(false);
    const apply = (n) => { dxRef.current = n; setDx(n); };
    const down = (e) => { if (e.target.closest('button')) return; st.current = { x: e.clientX, y: e.clientY, base: dxRef.current, active: false }; movedRef.current = false; };
    const move = (e) => {
      if (!st.current) return;
      const dX = e.clientX - st.current.x, dY = e.clientY - st.current.y;
      if (!st.current.active) { if (Math.abs(dX) > 8 && Math.abs(dX) > Math.abs(dY)) { st.current.active = true; setDragging(true); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} } else if (Math.abs(dY) > 10) { st.current = null; return; } }
      if (st.current.active) { const n = Math.max(-TRAY, Math.min(0, st.current.base + dX)); apply(n); if (Math.abs(n - st.current.base) > 6) movedRef.current = true; }
    };
    const up = () => { if (!st.current) { setDragging(false); return; } const a = st.current.active; st.current = null; setDragging(false); if (!a) return; apply(dxRef.current < -TRAY / 2 ? -TRAY : 0); };
    const close = () => apply(0);
    const trayBtn = { width: 46, height: 46, borderRadius: 12, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff' };
    return (
      <div style={{ position: 'relative', borderRadius: 18, overflow: 'hidden' }}>
        <div aria-hidden={dx === 0} style={{ position: 'absolute', top: 0, bottom: 0, right: 0, display: 'flex', alignItems: 'center', gap: 8, paddingRight: 12, paddingLeft: 12 }}>
          {!list.archived && <button onClick={() => { close(); onPin(); }} title={list.pinned ? 'Unpin' : 'Pin'} style={{ ...trayBtn, background: '#d6a43b' }}><window.Icons.Star size={20} filled color="#fff" /></button>}
          {!list.archived && <button onClick={() => { close(); onArchive(); }} title="Archive" style={{ ...trayBtn, background: '#8a9b6e' }}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8M10 12h4"/></svg></button>}
          {list.archived && <button onClick={() => { close(); onUnarchive(); }} title="Unarchive" style={{ ...trayBtn, background: '#8a9b6e' }}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8l9-5 9 5M5 9v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9M9 13h6"/></svg></button>}
          <button onClick={() => { close(); onDelete(); }} title="Delete" style={{ ...trayBtn, background: '#c4604c' }}><window.Icons.Trash size={20} color="#fff" /></button>
        </div>
        <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
          onClickCapture={(e) => { if (movedRef.current || dxRef.current !== 0) { e.preventDefault(); e.stopPropagation(); movedRef.current = false; if (dxRef.current !== 0) apply(0); } }}
          style={{ position: 'relative', transform: 'translateX(' + dx + 'px)', transition: dragging ? 'none' : 'transform .2s cubic-bezier(.3,.7,.4,1)', touchAction: 'pan-y' }}>
          <a className="feature" href={'./list/?id=' + encodeURIComponent(list.id)} style={{ marginBottom: 0 }}>
            <span className="ic" style={{ fontSize: 22, lineHeight: 1, overflow: 'hidden', padding: 0 }}>{list.icon_image ? <img src={list.icon_image} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : (list.emoji || '📋')}</span>
            <span><div className="title">{list.pinned && !list.archived ? '📌 ' : ''}{list.name}</div><div className="desc">Your custom shared list.</div></span>
            <span className="arrow">›</span>
          </a>
        </div>
      </div>
    );
  }

  const PREBUILT = [
    { key: 'shopping', href: './shopping-list/', title: 'Shopping List', desc: 'Our shared list — add, label and check things off.', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13 5.4 5M7 13l-2 6h12"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg> },
    { key: 'dates', href: './date-ideas/', title: 'Date Ideas', desc: 'Dates, trips & activities — save them, then schedule together.', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20s-7-4.6-9.2-9C1.3 7.6 3 4.5 6.2 4.5c1.9 0 3.2 1 3.8 2.3.6-1.3 1.9-2.3 3.8-2.3 3.2 0 4.9 3.1 3.4 6.5C19 15.4 12 20 12 20z"/></svg> },
    { key: 'notes', href: './notes/', title: 'Shared Notes', desc: 'Jot anything down together — labels, important, in sync.', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4a2 2 0 0 1 2-2h8l6 6v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg> },
    { key: 'wishlist', href: './wishlist/', title: 'Wishlist', desc: 'Save things you want from any shop — paste a link.', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20s-7-4.6-9.2-9C1.3 7.6 3 4.5 6.2 4.5c1.9 0 3.2 1 3.8 2.3.6-1.3 1.9-2.3 3.8-2.3 3.2 0 4.9 3.1 3.4 6.5C19 15.4 12 20 12 20z"/></svg> },
  ];

  // A pre-built feature card with swipe-left → Remove (hide it from the hub;
  // it can be re-added from the templates gallery).
  function PrebuiltSwipeCard({ feat, onRemove }) {
    const TRAY = 62;
    const [dx, setDx] = React.useState(0); const [dragging, setDragging] = React.useState(false);
    const st = React.useRef(null); const dxRef = React.useRef(0); const movedRef = React.useRef(false);
    const apply = (n) => { dxRef.current = n; setDx(n); };
    const down = (e) => { if (e.target.closest('button')) return; st.current = { x: e.clientX, y: e.clientY, base: dxRef.current, active: false }; movedRef.current = false; };
    const move = (e) => { if (!st.current) return; const dX = e.clientX - st.current.x, dY = e.clientY - st.current.y; if (!st.current.active) { if (Math.abs(dX) > 8 && Math.abs(dX) > Math.abs(dY)) { st.current.active = true; setDragging(true); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} } else if (Math.abs(dY) > 10) { st.current = null; return; } } if (st.current.active) { const n = Math.max(-TRAY, Math.min(0, st.current.base + dX)); apply(n); if (Math.abs(n - st.current.base) > 6) movedRef.current = true; } };
    const up = () => { if (!st.current) { setDragging(false); return; } const a = st.current.active; st.current = null; setDragging(false); if (!a) return; apply(dxRef.current < -TRAY / 2 ? -TRAY : 0); };
    return (
      <div style={{ position: 'relative', borderRadius: 18, overflow: 'hidden' }}>
        <div style={{ position: 'absolute', top: 0, bottom: 0, right: 0, display: 'flex', alignItems: 'center', paddingRight: 12, paddingLeft: 12 }}>
          <button onClick={() => { apply(0); onRemove(); }} title="Remove" style={{ width: 46, height: 46, borderRadius: 12, border: 'none', background: '#c4604c', color: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><window.Icons.Trash size={20} color="#fff" /></button>
        </div>
        <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up} onClickCapture={(e) => { if (movedRef.current || dxRef.current !== 0) { e.preventDefault(); e.stopPropagation(); movedRef.current = false; if (dxRef.current !== 0) apply(0); } }} style={{ position: 'relative', transform: 'translateX(' + dx + 'px)', transition: dragging ? 'none' : 'transform .2s cubic-bezier(.3,.7,.4,1)', touchAction: 'pan-y' }}>
          <a className="feature" href={feat.href} style={{ marginBottom: 0 }}>
            <span className="ic">{feat.icon}</span>
            <span><div className="title">{feat.title}</div><div className="desc">{feat.desc}</div></span>
            <span className="arrow">›</span>
          </a>
        </div>
      </div>
    );
  }

  function Hub({ sx }) {
    const { AccountButton, AccountSheet, HomeButton } = window.TogetherAccount;
    const BE = window.TogetherBackend;
    const [accountOpen, setAccountOpen] = React.useState(false);
    const [lists, setLists] = React.useState([]);
    const [buildOpen, setBuildOpen] = React.useState(false);
    const [newName, setNewName] = React.useState('');
    const [newEmoji, setNewEmoji] = React.useState('📋');
    const [iconImage, setIconImage] = React.useState(null);
    const [creating, setCreating] = React.useState(false);
    const onIconFile = (e) => {
      const file = e.target.files && e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => { const img = new Image(); img.onload = () => { const S = 96, c = document.createElement('canvas'); c.width = S; c.height = S; const ctx = c.getContext('2d'); const ratio = Math.max(S / img.width, S / img.height), w = img.width * ratio, h = img.height * ratio; ctx.drawImage(img, (S - w) / 2, (S - h) / 2, w, h); setIconImage(c.toDataURL('image/jpeg', 0.82)); }; img.src = r.result; };
      r.readAsDataURL(file);
    };
    const [archivedOpen, setArchivedOpen] = React.useState(false);
    const [hidden, setHidden] = React.useState([]);
    const [templatesOpen, setTemplatesOpen] = React.useState(false);
    const [bug, setBug] = React.useState({ open: false, sent: false, text: '' });

    React.useEffect(() => {
      if (!sx.homespaceId) return;
      let alive = true;
      const load = () => {
        BE.client.from('custom_lists').select('id,name,emoji,icon_image,pinned,archived,pos').eq('homespace_id', sx.homespaceId).order('pos', { ascending: true }).then(({ data }) => { if (alive) setLists(data || []); });
        BE.client.from('homespaces').select('hidden_features').eq('id', sx.homespaceId).maybeSingle().then(({ data }) => { if (alive && data) setHidden(Array.isArray(data.hidden_features) ? data.hidden_features : []); });
      };
      load();
      const ch = BE.client.channel('hublists:' + sx.homespaceId)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'custom_lists', filter: 'homespace_id=eq.' + sx.homespaceId }, load)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'homespaces', filter: 'id=eq.' + sx.homespaceId }, load)
        .subscribe();
      return () => { alive = false; BE.client.removeChannel(ch); };
    }, [sx.homespaceId]);

    const create = async () => {
      const name = newName.trim(); if (!name) return;
      setCreating(true);
      const id = BE.newId();
      const r = await BE.client.from('custom_lists').insert({ id, homespace_id: sx.homespaceId, name, emoji: newEmoji, icon_image: iconImage || null, created_by: sx.me && sx.me.uid, pos: Date.now() });
      setCreating(false);
      if (r.error) { console.warn('create list failed', r.error.message); return; }
      location.href = './list/?id=' + encodeURIComponent(id);
    };

    const updList = (id, p) => BE.client.from('custom_lists').update(p).eq('id', id).then(({ error }) => { if (error) console.warn('list update', error.message); });
    const pinList = (l) => updList(l.id, { pinned: !l.pinned });
    const archiveList = (l) => updList(l.id, { archived: true });
    const unarchiveList = (l) => updList(l.id, { archived: false });
    const deleteList = async (l) => {
      if (!window.confirm('Delete "' + l.name + '" and everything in it?')) return;
      await BE.client.from('custom_items').delete().eq('list_id', l.id);
      await BE.client.from('custom_labels').delete().eq('list_id', l.id);
      await BE.client.from('custom_lists').delete().eq('id', l.id);
    };
    const activeLists = lists.filter(l => !l.archived).sort((a, b) => (Number(b.pinned) - Number(a.pinned)) || (a.pos - b.pos));
    const archivedLists = lists.filter(l => l.archived);

    const saveHidden = (arr) => { setHidden(arr); BE.client.from('homespaces').update({ hidden_features: arr }).eq('id', sx.homespaceId).then(({ error }) => { if (error) console.warn('hidden update', error.message); }); };
    const hideFeature = (key) => saveHidden([...hidden.filter(k => k !== key), key]);
    const unhideFeature = (key) => { saveHidden(hidden.filter(k => k !== key)); setTemplatesOpen(false); };
    const createWatchList = async () => {
      const id = BE.newId();
      const r = await BE.client.from('custom_lists').insert({ id, homespace_id: sx.homespaceId, name: 'Watch list', emoji: '🍿', created_by: sx.me && sx.me.uid, pos: Date.now() });
      if (r.error) { console.warn('watchlist failed', r.error.message); return; }
      const tones = ['dine', 'trip', 'purple', 'green', 'sand'];
      await BE.client.from('custom_labels').insert(['Movies', 'Series', 'Anime', 'Documentary', 'Other'].map((n, i) => ({ homespace_id: sx.homespaceId, list_id: id, id: 'wl' + i, name: n, tone: tones[i], custom: true, sort: i })));
      location.href = './list/?id=' + encodeURIComponent(id);
    };
    const hiddenPrebuilts = PREBUILT.filter(p => hidden.includes(p.key));

    return (
      <React.Fragment>
        <main className="shell">
          <div className="brand-dots"><span></span><span></span></div>
          <h1>Together</h1>
          <p className="sub">Little apps for us</p>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <p className="label" style={{ margin: '0 0 12px' }}>Features</p>
            <a href="./summary/" title="Progress summary" style={{ fontSize: 12.5, fontWeight: 800, color: '#a8794f', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 5 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg>Summary
            </a>
          </div>
          <div className="features">
            {PREBUILT.filter(p => !hidden.includes(p.key)).map(p => (
              <PrebuiltSwipeCard key={p.key} feat={p} onRemove={() => hideFeature(p.key)} />
            ))}

            {activeLists.map(l => (
              <HubSwipeCard key={l.id} list={l} onPin={() => pinList(l)} onArchive={() => archiveList(l)} onDelete={() => deleteList(l)} />
            ))}

            <button className="feature" onClick={() => setTemplatesOpen(true)} style={{ cursor: 'pointer', textAlign: 'left', border: '1px dashed #d9cbb7', background: 'transparent', font: 'inherit', width: '100%' }}>
              <span className="ic" style={{ background: '#efe9e0', color: '#a8794f', fontSize: 24, lineHeight: 1 }}>+</span>
              <span><div className="title">Build new</div><div className="desc">Add a template, a watch list, or your own.</div></span>
              <span className="arrow">›</span>
            </button>
          </div>

          {archivedLists.length > 0 && (
            <React.Fragment>
              <button onClick={() => setArchivedOpen(o => !o)} style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '22px 0 0', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit', padding: '4px 2px' }}>
                <span className="label" style={{ margin: 0 }}>Archived ({archivedLists.length})</span>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#bcb3a6" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{ transform: archivedOpen ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform .18s ease' }}><path d="M6 9l6 6 6-6"/></svg>
              </button>
              {archivedOpen && (
                <div className="features" style={{ marginTop: 12, opacity: .82 }}>
                  {archivedLists.map(l => <HubSwipeCard key={l.id} list={l} onUnarchive={() => unarchiveList(l)} onDelete={() => deleteList(l)} />)}
                </div>
              )}
            </React.Fragment>
          )}
        </main>

        <HomeButton href="./" />
        <AccountButton sx={sx} onOpen={() => setAccountOpen(true)} />
        {accountOpen && <AccountSheet sx={sx} onClose={() => setAccountOpen(false)} />}

        {/* fixed bug-report button (top-right) */}
        <button onClick={() => setBug({ open: true, sent: false, text: '' })} title="Report a problem"
          style={{ position: 'fixed', top: 24, right: 24, zIndex: 900, width: 46, height: 46, borderRadius: '50%', border: '1px solid #ecd9c4', background: '#fffaf3', color: '#b07d42', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 2px 4px rgba(58,53,47,.08),0 8px 20px rgba(58,53,47,.12)' }}>
          <window.Icons.Bug size={21} />
        </button>

        {templatesOpen && (
          <div onClick={() => setTemplatesOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 1300, background: 'rgba(58,53,47,.42)', backdropFilter: 'blur(3px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 18 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 380, background: '#f6f4ef', borderRadius: 26, boxShadow: '0 24px 60px rgba(58,53,47,.34)', padding: 22, maxHeight: '90vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
                <h2 style={{ fontFamily: "'Quicksand',sans-serif", fontSize: 22, fontWeight: 700, margin: 0, color: '#3a352f' }}>Add to your hub</h2>
                <button onClick={() => setTemplatesOpen(false)} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#ece6db', color: '#857c70', fontSize: 17, cursor: 'pointer' }}>×</button>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <button onClick={() => { setTemplatesOpen(false); setNewName(''); setNewEmoji('📋'); setIconImage(null); setBuildOpen(true); }} className="feature" style={{ cursor: 'pointer', textAlign: 'left', border: '1px solid #ece6db', background: '#fff', font: 'inherit', width: '100%', marginBottom: 0 }}>
                  <span className="ic" style={{ background: '#efe9e0', color: '#a8794f', fontSize: 22 }}>✏️</span>
                  <span><div className="title">Blank list</div><div className="desc">Name it, pick an icon, start from scratch.</div></span>
                  <span className="arrow">›</span>
                </button>
                <button onClick={createWatchList} className="feature" style={{ cursor: 'pointer', textAlign: 'left', border: '1px solid #ece6db', background: '#fff', font: 'inherit', width: '100%', marginBottom: 0 }}>
                  <span className="ic" style={{ fontSize: 22 }}>🍿</span>
                  <span><div className="title">Watch list</div><div className="desc">Movies, series, anime &amp; more — labels ready.</div></span>
                  <span className="arrow">›</span>
                </button>
                {hiddenPrebuilts.length > 0 && <div style={{ margin: '8px 0 2px', fontSize: 11, fontWeight: 800, color: '#aaa093', letterSpacing: '.6px', textTransform: 'uppercase' }}>Re-add a feature</div>}
                {hiddenPrebuilts.map(p => (
                  <button key={p.key} onClick={() => unhideFeature(p.key)} className="feature" style={{ cursor: 'pointer', textAlign: 'left', border: '1px solid #ece6db', background: '#fff', font: 'inherit', width: '100%', marginBottom: 0 }}>
                    <span className="ic">{p.icon}</span>
                    <span><div className="title">{p.title}</div><div className="desc">{p.desc}</div></span>
                    <span className="arrow" style={{ color: '#a8794f', fontWeight: 800, fontSize: 13 }}>Add</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {buildOpen && (
          <div onClick={() => setBuildOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 1310, background: 'rgba(58,53,47,.42)', backdropFilter: 'blur(3px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 18 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 380, background: '#f6f4ef', borderRadius: 26, boxShadow: '0 24px 60px rgba(58,53,47,.34)', padding: 22 }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
                <h2 style={{ fontFamily: "'Quicksand',sans-serif", fontSize: 22, fontWeight: 700, margin: 0, color: '#3a352f' }}>Build a new list</h2>
                <button onClick={() => setBuildOpen(false)} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#ece6db', color: '#857c70', fontSize: 17, cursor: 'pointer' }}>×</button>
              </div>
              <input value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') create(); }} placeholder="List name (e.g. Movies to watch)" autoFocus style={{ width: '100%', border: '1px solid #ece6db', background: '#fff', borderRadius: 13, padding: '13px 15px', fontSize: 15, fontFamily: 'inherit', fontWeight: 700, color: '#3a352f', outline: 'none' }} />
              <div style={{ margin: '14px 0 8px', fontSize: 11, fontWeight: 800, color: '#aaa093', letterSpacing: '.6px', textTransform: 'uppercase' }}>Icon — pick, type your own, or add an image</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                <span style={{ width: 46, height: 46, borderRadius: 12, background: '#f4e8dd', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', flexShrink: 0, fontSize: 24 }}>{iconImage ? <img src={iconImage} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : newEmoji}</span>
                <input value={iconImage ? '' : newEmoji} onChange={(e) => { setIconImage(null); setNewEmoji(e.target.value || '📋'); }} placeholder="Type" maxLength={4} style={{ width: 64, textAlign: 'center', fontSize: 20, border: '1px solid #ece6db', background: '#fff', borderRadius: 11, padding: '9px 6px', fontFamily: 'inherit', outline: 'none' }} />
                <label style={{ display: 'flex', alignItems: 'center', gap: 6, border: '1px solid #ece6db', background: '#fff', borderRadius: 11, padding: '10px 14px', fontSize: 13, fontWeight: 800, color: '#7a7166', cursor: 'pointer' }}>Image<input type="file" accept="image/*" onChange={onIconFile} style={{ display: 'none' }} /></label>
                {iconImage && <button onClick={() => setIconImage(null)} title="Remove image" style={{ border: 'none', background: '#f6ece9', color: '#b07a6e', width: 34, height: 34, borderRadius: 10, fontSize: 15, cursor: 'pointer' }}>×</button>}
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                {EMOJIS.map(em => { const sel = !iconImage && newEmoji === em; return <button key={em} onClick={() => { setNewEmoji(em); setIconImage(null); }} style={{ width: 40, height: 40, borderRadius: 11, border: '1px solid ' + (sel ? '#c98a5c' : '#ece6db'), background: sel ? '#f4e8dd' : '#fff', fontSize: 20, cursor: 'pointer' }}>{em}</button>; })}
              </div>
              <button onClick={create} disabled={creating || !newName.trim()} style={{ marginTop: 20, width: '100%', background: newName.trim() ? '#c98a5c' : '#d9cfc0', color: '#fff', border: 'none', borderRadius: 14, padding: 14, fontWeight: 800, fontSize: 15, cursor: newName.trim() ? 'pointer' : 'default', fontFamily: 'inherit' }}>{creating ? 'Creating…' : 'Create list'}</button>
            </div>
          </div>
        )}

        {bug.open && (
          <div onClick={() => setBug({ open: false, sent: false, text: '' })} style={{ position: 'fixed', inset: 0, zIndex: 1400, background: 'rgba(58,53,47,.42)', backdropFilter: 'blur(3px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 18 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 380, background: '#f6f4ef', borderRadius: 26, boxShadow: '0 24px 60px rgba(58,53,47,.34)', padding: 24 }}>
              {!bug.sent ? (
                <React.Fragment>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}><h2 style={{ fontFamily: "'Quicksand',sans-serif", fontSize: 22, fontWeight: 700, margin: 0, color: '#3a352f' }}>Report a Problem</h2><button onClick={() => setBug({ open: false, sent: false, text: '' })} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#ece6db', color: '#857c70', fontSize: 17, cursor: 'pointer' }}>×</button></div>
                  <textarea value={bug.text} onChange={(e) => setBug(b => ({ ...b, text: e.target.value }))} placeholder="Tell us what went wrong…" style={{ marginTop: 14, width: '100%', minHeight: 92, resize: 'vertical', background: '#fff', borderRadius: 14, padding: '13px 14px', fontSize: 14.5, fontFamily: 'inherit', fontWeight: 600, color: '#3a352f', outline: 'none', lineHeight: 1.5, border: '1px solid #ece6db' }} />
                  <button onClick={() => { try { console.info('[Together] Bug (hub)', { text: bug.text }); } catch (e) {} setBug(b => ({ ...b, sent: true })); }} style={{ marginTop: 16, width: '100%', background: '#c98a5c', color: '#fff', border: 'none', borderRadius: 14, padding: 13, fontWeight: 800, fontSize: 14.5, cursor: 'pointer', fontFamily: 'inherit' }}>Send Report</button>
                </React.Fragment>
              ) : (
                <div style={{ textAlign: 'center', padding: '14px 6px' }}><h2 style={{ fontFamily: "'Quicksand',sans-serif", fontSize: 24, fontWeight: 700, margin: '0 0 8px', color: '#3a352f' }}>Thanks ♥</h2><button onClick={() => setBug({ open: false, sent: false, text: '' })} style={{ marginTop: 8, width: '100%', background: '#c98a5c', color: '#fff', border: 'none', borderRadius: 14, padding: 13, fontWeight: 800, fontSize: 15, cursor: 'pointer', fontFamily: 'inherit' }}>Close</button></div>
              )}
            </div>
          </div>
        )}
      </React.Fragment>
    );
  }

  // Auth gate: resolve session → sign-in screen → set up homespace → the hub.
  function App() {
    const sx = window.useTogetherSession();
    const { SignIn, Splash } = window.TogetherAccount;
    if (!sx.ready) return <Splash text="…" />;
    if (!sx.session) return <SignIn onGoogle={sx.actions.signInGoogle} />;
    if (!sx.homespaceId) return <Splash text={sx.error ? ('Something went wrong: ' + sx.error) : 'Setting up your space…'} />;
    return <Hub sx={sx} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
