<!-- shared design tokens (CSS vars, .app / .app-shell, animations) reused from the apps -->
<link rel="stylesheet" href="shopping-list/styles.css" />
<style>
  /* Hub-specific card styling (the signed-in landing). The sign-in / splash
     screens are the shared TogetherAccount components and use styles.css. */
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .shell {
    width: 100%; max-width: 460px; background: #f6f4ef; border: 1px solid #efe9e0;
    border-radius: 30px; box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 30px 60px rgba(58,53,47,.14);
    padding: 40px 28px 34px;
  }
  .brand-dots { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .brand-dots span { width: 20px; height: 20px; border-radius: 50%; }
  .brand-dots span:nth-child(1) { background: #c98a5c; }
  .brand-dots span:nth-child(2) { background: #8a9b6e; margin-left: -8px; }
  h1 { font-family: 'Quicksand', sans-serif; font-size: 34px; font-weight: 700; margin: 0; text-align: center; letter-spacing: .3px; }
  .sub { margin: 6px 0 28px; text-align: center; color: #9a9186; font-weight: 600; font-size: 15px; }
  .label { font-size: 11px; font-weight: 800; color: #aaa093; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px 2px; }
  .features { display: flex; flex-direction: column; gap: 12px; }
  .feature {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    background: #fff; border: 1px solid transparent; text-decoration: none; color: inherit;
    box-shadow: 0 1px 2px rgba(58,53,47,.05), 0 6px 16px rgba(58,53,47,.035);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .feature:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 12px 26px rgba(58,53,47,.08); }
  .feature .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #f4e8dd; color: #a8794f; }
  .feature .title { font-family: 'Quicksand', sans-serif; font-size: 18px; font-weight: 700; }
  .feature .desc { font-size: 13px; font-weight: 600; color: #9a9186; margin-top: 2px; }
  .feature .arrow { margin-left: auto; color: #c3bbae; font-size: 22px; }
  .soon {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    border: 1px dashed #d9cbb7; color: #b3a99c;
  }
  .soon .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #efe9e0; color: #b3a99c; font-size: 22px; font-weight: 800; }
  .soon .title { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: #a89e90; }
  .soon .desc { font-size: 13px; font-weight: 600; margin-top: 2px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" crossorigin="anonymous"></script>

  <!-- shared modules (reused from shopping-list/): icon set, auth client, session/homespace, account UI -->
  <script type="text/babel" src="shopping-list/icons.jsx"></script>
  <script type="text/babel" src="shopping-list/supabase.jsx"></script>
  <script type="text/babel" src="shopping-list/session.jsx"></script>
  <script type="text/babel" src="shopping-list/account.jsx"></script>

  <script type="text/babel">
  // The hub is gated behind Google sign-in, exactly like the apps: resolve the
  // session → show the sign-in screen → set up the homespace → show the launcher.
  // Signing in here means you arrive at either app already logged in.
  function Hub({ sx }) {
    const { AccountButton, AccountSheet } = window.TogetherAccount;
    const [accountOpen, setAccountOpen] = React.useState(false);
    return (
      <React.Fragment>
        <main className="shell">
          <div className="brand-dots"><span></span><span></span></div>
          <h1>Together</h1>
          <p className="sub">Little apps for us</p>

          <p className="label">Features</p>
          <div className="features">
            <a className="feature" href="./shopping-list/">
              <span className="ic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13 5.4 5M7 13l-2 6h12"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
              </span>
              <span>
                <div className="title">Shopping List</div>
                <div className="desc">Our shared list — add, label and check things off.</div>
              </span>
              <span className="arrow">›</span>
            </a>

            <a className="feature" href="./date-ideas/">
              <span className="ic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20s-7-4.6-9.2-9C1.3 7.6 3 4.5 6.2 4.5c1.9 0 3.2 1 3.8 2.3.6-1.3 1.9-2.3 3.8-2.3 3.2 0 4.9 3.1 3.4 6.5C19 15.4 12 20 12 20z"/></svg>
              </span>
              <span>
                <div className="title">Date Ideas</div>
                <div className="desc">Dates, trips &amp; activities — save them, then schedule together.</div>
              </span>
              <span className="arrow">›</span>
            </a>

            <div className="soon">
              <span className="ic">+</span>
              <span>
                <div className="title">More coming</div>
                <div className="desc">Room for the next thing we build together.</div>
              </span>
            </div>
          </div>
        </main>

        {/* fixed account button (top-left) — names, members, invite, sign out */}
        <AccountButton sx={sx} onOpen={() => setAccountOpen(true)} />
        {accountOpen && <AccountSheet sx={sx} onClose={() => setAccountOpen(false)} />}
      </React.Fragment>
    );
  }

  // Auth gate: resolve session → sign-in screen → set up homespace → the hub.
  function App() {
    const sx = window.useTogetherSession();
    const { SignIn, Splash } = window.TogetherAccount;
    if (!sx.ready) return <Splash text="…" />;
    if (!sx.session) return <SignIn onGoogle={sx.actions.signInGoogle} />;
    if (!sx.homespaceId) return <Splash text={sx.error ? ('Something went wrong: ' + sx.error) : 'Setting up your space…'} />;
    return <Hub sx={sx} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
