<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: #e8e3da;
    font-family: 'Nunito', -apple-system, sans-serif; color: #3a352f;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .shell {
    width: 100%; max-width: 460px; background: #f6f4ef; border: 1px solid #efe9e0;
    border-radius: 30px; box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 30px 60px rgba(58,53,47,.14);
    padding: 40px 28px 34px;
  }
  .brand-dots { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .brand-dots span { width: 20px; height: 20px; border-radius: 50%; }
  .brand-dots span:nth-child(1) { background: #c98a5c; }
  .brand-dots span:nth-child(2) { background: #8a9b6e; margin-left: -8px; }
  h1 { font-family: 'Quicksand', sans-serif; font-size: 34px; font-weight: 700; margin: 0; text-align: center; letter-spacing: .3px; }
  .sub { margin: 6px 0 28px; text-align: center; color: #9a9186; font-weight: 600; font-size: 15px; }
  .label { font-size: 11px; font-weight: 800; color: #aaa093; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px 2px; }
  .features { display: flex; flex-direction: column; gap: 12px; }
  .feature {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    background: #fff; border: 1px solid transparent; text-decoration: none; color: inherit;
    box-shadow: 0 1px 2px rgba(58,53,47,.05), 0 6px 16px rgba(58,53,47,.035);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .feature:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(58,53,47,.06), 0 12px 26px rgba(58,53,47,.08); }
  .feature .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #f4e8dd; color: #a8794f; }
  .feature .title { font-family: 'Quicksand', sans-serif; font-size: 18px; font-weight: 700; }
  .feature .desc { font-size: 13px; font-weight: 600; color: #9a9186; margin-top: 2px; }
  .feature .arrow { margin-left: auto; color: #c3bbae; font-size: 22px; }
  .soon {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 18px;
    border: 1px dashed #d9cbb7; color: #b3a99c;
  }
  .soon .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #efe9e0; color: #b3a99c; font-size: 22px; font-weight: 800; }
  .soon .title { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: #a89e90; }
  .soon .desc { font-size: 13px; font-weight: 600; margin-top: 2px; }
</style>

<body>
  <main class="shell">
    <div class="brand-dots"><span></span><span></span></div>
    <h1>Together</h1>
    <p class="sub">Little apps for us</p>

    <p class="label">Features</p>
    <div class="features">
      <a class="feature" href="./shopping-list/">
        <span class="ic">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13 5.4 5M7 13l-2 6h12"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
        </span>

          <div class="desc">Our shared list — add, label and check things off.</div>
        </span>
        <span class="arrow">›</span>
      </a>

      <a class="feature" href="./date-ideas/">
        <span class="ic">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.6-9.2-9C1.3 7.6 3 4.5 6.2 4.5c1.9 0 3.2 1 3.8 2.3.6-1.3 1.9-2.3 3.8-2.3 3.2 0 4.9 3.1 3.4 6.5C19 15.4 12 20 12 20z"/></svg>
        </span>
        <span>
          <div class="title">Date Ideas</div>
          <div class="desc">Dates, trips &amp; activities — save them, then schedule together.</div>
        </span>
        <span class="arrow">›</span>
      </a>

      <div class="soon">
        <span class="ic">+</span>
        <span>
          <div class="title">More coming</div>
          <div class="desc">Room for the next thing we build together.</div>
        </span>
      </div>
    </div>
  </main>
